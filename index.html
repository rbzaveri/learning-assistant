<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Learning Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0f14;
    --surface: #13161e;
    --surface-2: #1a1e29;
    --border: #252a38;
    --border-light: #2e3448;
    --text: #e8eaf0;
    --text-muted: #6b7280;
    --text-dim: #9ca3af;
    --accent: #4f8ef7;
    --accent-glow: rgba(79, 142, 247, 0.15);
    --accent-hover: #6ba3ff;
    --green: #34d399;
    --green-glow: rgba(52, 211, 153, 0.15);
    --red: #f87171;
    --amber: #fbbf24;
    --radius: 18px;
    --radius-sm: 10px;
  }

  body {
    font-family: 'Sora', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    color: var(--text);
  }

  /* Subtle background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(79,142,247,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(79,142,247,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  .container {
    width: 100%;
    max-width: 520px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 4px;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-mark {
    width: 32px;
    height: 32px;
    background: var(--accent);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-mark svg { width: 18px; height: 18px; fill: white; }

  .header h1 {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.3px;
    color: var(--text);
  }

  .header p {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 1px;
    font-family: 'JetBrains Mono', monospace;
  }

  .connection-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-muted);
    background: var(--surface);
    transition: all 0.3s ease;
  }

  .connection-badge.connected {
    border-color: rgba(52,211,153,0.3);
    color: var(--green);
    background: var(--green-glow);
  }

  .connection-badge.connecting {
    border-color: rgba(251,191,36,0.3);
    color: var(--amber);
    background: rgba(251,191,36,0.08);
  }

  .badge-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: currentColor;
  }

  .connected .badge-dot { animation: pulse-dot 2s ease-in-out infinite; }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Avatar panel */
  .avatar-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    position: relative;
    aspect-ratio: 16/9;
  }

  .avatar-video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: none;
  }

  .avatar-video.active { display: block; }

  /* Idle state */
  .avatar-idle {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    background: var(--surface);
  }

  .idle-avatar-ring {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: 2px solid var(--border-light);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .idle-avatar-ring::before {
    content: '';
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    border: 1px solid rgba(79,142,247,0.2);
    animation: ring-pulse 3s ease-in-out infinite;
  }

  @keyframes ring-pulse {
    0%, 100% { opacity: 0.3; transform: scale(1); }
    50% { opacity: 0.8; transform: scale(1.04); }
  }

  .idle-avatar-icon {
    width: 40px;
    height: 40px;
    fill: var(--text-muted);
  }

  .idle-text {
    text-align: center;
  }

  .idle-text h3 {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-dim);
  }

  .idle-text p {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 3px;
  }

  /* Speaking indicator overlay */
  .speaking-overlay {
    position: absolute;
    bottom: 14px;
    left: 14px;
    display: none;
    align-items: center;
    gap: 6px;
    background: rgba(13,15,20,0.75);
    backdrop-filter: blur(8px);
    border: 1px solid var(--border-light);
    border-radius: 20px;
    padding: 6px 12px;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--green);
  }

  .speaking-overlay.visible { display: flex; }

  .sound-bars {
    display: flex;
    align-items: flex-end;
    gap: 2px;
    height: 14px;
  }

  .bar {
    width: 3px;
    background: var(--green);
    border-radius: 2px;
    animation: sound-bar 0.8s ease-in-out infinite;
  }

  .bar:nth-child(1) { animation-delay: 0s; }
  .bar:nth-child(2) { animation-delay: 0.15s; }
  .bar:nth-child(3) { animation-delay: 0.3s; }
  .bar:nth-child(4) { animation-delay: 0.15s; }

  @keyframes sound-bar {
    0%, 100% { height: 4px; }
    50% { height: 14px; }
  }

  /* Transcript */
  .transcript-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .transcript-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .transcript-header span {
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .clear-btn {
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-muted);
    background: none;
    border: none;
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 4px;
    transition: color 0.15s;
  }

  .clear-btn:hover { color: var(--text-dim); }

  .transcript-messages {
    max-height: 180px;
    overflow-y: auto;
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .transcript-messages::-webkit-scrollbar { width: 3px; }
  .transcript-messages::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }

  .t-msg {
    display: flex;
    flex-direction: column;
    gap: 3px;
    animation: fadeUp 0.2s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .t-label {
    font-size: 10px;
    font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .t-msg.learner .t-label { color: var(--accent); }
  .t-msg.assistant .t-label { color: var(--green); }

  .t-text {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.5;
  }

  .transcript-empty {
    font-size: 12px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    text-align: center;
    padding: 16px 0;
  }

  /* Controls */
  .controls {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  /* Text input row */
  .input-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }

  .input-wrapper {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    display: flex;
    align-items: flex-end;
    padding: 10px 14px;
    transition: border-color 0.15s;
    gap: 8px;
  }

  .input-wrapper:focus-within {
    border-color: rgba(79,142,247,0.5);
    background: var(--surface-2);
  }

  textarea {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    font-family: 'Sora', sans-serif;
    font-size: 13.5px;
    color: var(--text);
    resize: none;
    line-height: 1.5;
    max-height: 90px;
    min-height: 20px;
  }

  textarea::placeholder { color: var(--text-muted); }

  .send-btn {
    width: 38px;
    height: 38px;
    background: var(--accent);
    border: none;
    border-radius: 9px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, transform 0.1s, opacity 0.15s;
  }

  .send-btn:hover:not(:disabled) { background: var(--accent-hover); }
  .send-btn:active:not(:disabled) { transform: scale(0.93); }
  .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .send-btn svg { width: 16px; height: 16px; fill: white; }

  /* Action buttons row */
  .action-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
  }

  .action-btn {
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--surface);
    font-family: 'Sora', sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-dim);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: all 0.15s ease;
  }

  .action-btn:hover:not(:disabled) {
    border-color: var(--border-light);
    color: var(--text);
    background: var(--surface-2);
  }

  .action-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .action-btn.primary {
    background: var(--accent-glow);
    border-color: rgba(79,142,247,0.3);
    color: var(--accent);
  }

  .action-btn.primary:hover:not(:disabled) {
    background: rgba(79,142,247,0.2);
    border-color: rgba(79,142,247,0.5);
  }

  .action-btn.danger {
    background: rgba(248,113,113,0.08);
    border-color: rgba(248,113,113,0.2);
    color: var(--red);
  }

  .action-btn.danger:hover:not(:disabled) {
    background: rgba(248,113,113,0.15);
  }

  .action-btn.recording {
    background: rgba(248,113,113,0.15);
    border-color: rgba(248,113,113,0.4);
    color: var(--red);
    animation: recording-pulse 1.5s ease-in-out infinite;
  }

  @keyframes recording-pulse {
    0%, 100% { border-color: rgba(248,113,113,0.4); }
    50% { border-color: rgba(248,113,113,0.8); }
  }

  .action-btn svg { width: 14px; height: 14px; fill: currentColor; }

  /* Config notice */
  .config-notice {
    background: rgba(251,191,36,0.08);
    border: 1px solid rgba(251,191,36,0.25);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--amber);
    line-height: 1.6;
  }

  .config-notice code {
    background: rgba(255,255,255,0.08);
    padding: 1px 5px;
    border-radius: 4px;
  }

  /* Status bar */
  .status-bar {
    padding: 0 4px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .status-text {
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-muted);
  }

  .status-text.active { color: var(--accent); }
  .status-text.error { color: var(--red); }
</style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg>
      </div>
      <div>
        <h1>Learning Assistant</h1>
        <p>powered by claude + heygen</p>
      </div>
    </div>
    <div class="connection-badge" id="connectionBadge">
      <div class="badge-dot"></div>
      <span id="connectionText">disconnected</span>
    </div>
  </div>

  <!-- Config notice (shown until keys are set) -->
  <div class="config-notice" id="configNotice">
    ⚠ Set your keys: <code>HEYGEN_API_KEY</code>, <code>AVATAR_ID</code>, <code>ANTHROPIC_API_KEY</code>, and <code>COURSE_TOPIC</code> in the script below.
  </div>

  <!-- Avatar panel -->
  <div class="avatar-panel">
    <video class="avatar-video" id="avatarVideo" autoplay playsinline></video>

    <div class="avatar-idle" id="avatarIdle">
      <div class="idle-avatar-ring">
        <svg class="idle-avatar-icon" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
      </div>
      <div class="idle-text">
        <h3>Avatar not connected</h3>
        <p>Click "Start Session" to begin</p>
      </div>
    </div>

    <div class="speaking-overlay" id="speakingOverlay">
      <div class="sound-bars">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
      </div>
      <span>Speaking...</span>
    </div>
  </div>

  <!-- Transcript -->
  <div class="transcript-panel">
    <div class="transcript-header">
      <span>Conversation</span>
      <button class="clear-btn" onclick="clearTranscript()">clear</button>
    </div>
    <div class="transcript-messages" id="transcript">
      <div class="transcript-empty" id="transcriptEmpty">No messages yet</div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <div class="input-row">
      <div class="input-wrapper">
        <textarea
          id="questionInput"
          placeholder="Type your question..."
          rows="1"
          onkeydown="handleKey(event)"
          oninput="autoResize(this)"
          disabled
        ></textarea>
      </div>
      <button class="send-btn" id="sendBtn" onclick="handleSendText()" disabled title="Send">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>

    <div class="action-row">
      <button class="action-btn primary" id="startBtn" onclick="startSession()">
        <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        Start Session
      </button>
      <button class="action-btn" id="voiceBtn" onclick="toggleVoice()" disabled>
        <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1 1.93c-3.95-.49-7-3.85-7-7.93H2c0 4.97 3.53 9.11 8 9.9V22h4v-4.07c4.47-.79 8-4.93 8-9.9h-2c0 4.08-3.05 7.44-7 7.93V15z"/></svg>
        Hold to Speak
      </button>
      <button class="action-btn danger" id="stopBtn" onclick="stopSession()" disabled>
        <svg viewBox="0 0 24 24"><path d="M6 6h12v12H6z"/></svg>
        End Session
      </button>
    </div>
  </div>

  <!-- Status -->
  <div class="status-bar">
    <span class="status-text" id="statusText">Ready to connect</span>
  </div>

</div>

<script>
// ═══════════════════════════════════════════
// CONFIGURATION — replace all four values
// ═══════════════════════════════════════════
const HEYGEN_API_KEY    = 'c7fc4a27-83bc-4a45-aab2-dcd35fc24202';
const AVATAR_ID         = '073b60a9-89a8-45aa-8902-c358f64d2852';         // From HeyGen → Avatars
const ANTHROPIC_API_KEY = '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';
const COURSE_TOPIC      = 'RETURN ON ASSETS';       // e.g. 'workplace safety'

const SYSTEM_PROMPT = `You are a helpful, encouraging learning assistant embedded in an eLearning course about ${COURSE_TOPIC}.
Your role is to help learners understand the course content.
Guidelines:
- Keep answers focused and clear — you will be spoken aloud by an avatar, so avoid markdown, bullet points, or special characters
- Use natural conversational language suitable for speaking
- Keep responses concise (2-4 sentences) unless the question requires more detail
- If asked something outside the course scope, politely redirect to the course content
- Be warm and encouraging`;

// ═══════════════════════════════════════════
// App state
// ═══════════════════════════════════════════
let avatar = null;
let sessionData = null;
let sessionId = null;
let currentSessionToken = null;
let isConnected = false;
let isProcessing = false;
let isRecording = false;
let recognition = null;
const conversationHistory = [];

// Hide config notice if keys are set
if (HEYGEN_API_KEY !== 'c7fc4a27-83bc-4a45-aab2-dcd35fc24202') {
  document.getElementById('configNotice').style.display = 'none';
}

// ═══════════════════════════════════════════
// UI helpers
// ═══════════════════════════════════════════
function setStatus(msg, type = '') {
  const el = document.getElementById('statusText');
  el.textContent = msg;
  el.className = 'status-text' + (type ? ' ' + type : '');
}

function setConnection(state) {
  const badge = document.getElementById('connectionBadge');
  const text = document.getElementById('connectionText');
  badge.className = 'connection-badge ' + state;
  text.textContent = state;
}

function setSpeaking(speaking) {
  const overlay = document.getElementById('speakingOverlay');
  overlay.classList.toggle('visible', speaking);
}

function addToTranscript(role, text) {
  const container = document.getElementById('transcript');
  const empty = document.getElementById('transcriptEmpty');
  if (empty) empty.remove();

  const msg = document.createElement('div');
  msg.className = `t-msg ${role}`;
  msg.innerHTML = `
    <span class="t-label">${role === 'learner' ? 'You' : 'Assistant'}</span>
    <span class="t-text">${text}</span>
  `;
  container.appendChild(msg);
  container.scrollTop = container.scrollHeight;
}

function clearTranscript() {
  const container = document.getElementById('transcript');
  container.innerHTML = '<div class="transcript-empty" id="transcriptEmpty">No messages yet</div>';
  conversationHistory.length = 0;
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 90) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    handleSendText();
  }
}

function setControlsEnabled(connected) {
  document.getElementById('questionInput').disabled = !connected;
  document.getElementById('sendBtn').disabled = !connected;
  document.getElementById('voiceBtn').disabled = !connected;
  document.getElementById('stopBtn').disabled = !connected;
  document.getElementById('startBtn').disabled = connected;
}

// ═══════════════════════════════════════════
// HeyGen session
// ═══════════════════════════════════════════
async function startSession() {
  setStatus('Connecting to avatar...', 'active');
  setConnection('connecting');
  document.getElementById('startBtn').disabled = true;

  try {
    // 1. Get a session token from LiveAvatar
    const tokenRes = await fetch('https://api.liveavatar.com/v1/sessions/token', {
      method: 'POST',
      headers: {
        'X-API-KEY': HEYGEN_API_KEY,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        mode: 'LITE',
        avatar_id: AVATAR_ID,
        video_settings: { encoding: 'VP8', quality: 'high' }
      })
    });
    const tokenData = await tokenRes.json();
    if (!tokenData.data?.session_token) throw new Error('Token failed: ' + JSON.stringify(tokenData));
    currentSessionToken = tokenData.data.session_token;
    sessionId = tokenData.data.session_id;
    setStatus('Starting session...', 'active');

    // 2. Start the session — get LiveKit credentials
    const startRes = await fetch('https://api.liveavatar.com/v1/sessions/start', {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + currentSessionToken,
        'Content-Type': 'application/json'
      }
    });
    const startData = await startRes.json();
    if (!startData.data?.livekit_url) throw new Error('Start failed: ' + JSON.stringify(startData));
    const { livekit_url, livekit_client_token } = startData.data;
    setStatus('Connecting video stream...', 'active');

    // 3. Load LiveKit SDK on demand and connect
    await new Promise((resolve, reject) => {
      if (window.LivekitClient) return resolve();
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js';
      s.onload = () => { console.log('LiveKit loaded', typeof window.LivekitClient); resolve(); };
      s.onerror = reject;
      document.body.appendChild(s);
    });

    // Small delay to ensure SDK is fully initialised
    await new Promise(r => setTimeout(r, 300));

    if (!window.LivekitClient) throw new Error('LiveKit SDK did not initialise');

    const room = new window.LivekitClient.Room({ adaptiveStream: true, dynacast: true });
    avatar = room;

    room.on(window.LivekitClient.RoomEvent.TrackSubscribed, (track) => {
      if (track.kind === window.LivekitClient.Track.Kind.Video) {
        const video = document.getElementById('avatarVideo');
        track.attach(video);
        video.classList.add('active');
        document.getElementById('avatarIdle').style.display = 'none';
        isConnected = true;
        setConnection('connected');
        setControlsEnabled(true);
        setStatus('Session active — ask your question');
      }
    });

    room.on(window.LivekitClient.RoomEvent.Disconnected, () => handleDisconnect());

    await room.connect(livekit_url, livekit_client_token);

  } catch (err) {
    setStatus('Connection failed: ' + err.message, 'error');
    setConnection('disconnected');
    document.getElementById('startBtn').disabled = false;
    console.error('Session error:', err);
  }
}
async function stopSession() {
  if (avatar) {
    try { await avatar.disconnect(); } catch (_) {}
  }
  handleDisconnect();
}

function handleDisconnect() {
  isConnected = false;
  avatar = null;
  sessionData = null;
  sessionId = null;
  currentSessionToken = null;
  const video = document.getElementById('avatarVideo');
  video.srcObject = null;
  video.classList.remove('active');
  document.getElementById('avatarIdle').style.display = 'flex';
  setSpeaking(false);
  setConnection('disconnected');
  setControlsEnabled(false);
  setStatus('Session ended');
}

// ═══════════════════════════════════════════
// Claude API
// ═══════════════════════════════════════════
async function getClaudeResponse(userMessage) {
  conversationHistory.push({ role: 'user', content: userMessage });

  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': ANTHROPIC_API_KEY,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-5',
      max_tokens: 1024,
      system: SYSTEM_PROMPT,
      messages: conversationHistory
    })
  });

  const data = await response.json();
  if (!response.ok) throw new Error(data.error?.message || 'Claude API error');

  const reply = data.content?.[0]?.text || 'Sorry, I could not generate a response.';
  conversationHistory.push({ role: 'assistant', content: reply });
  return reply;
}

// ═══════════════════════════════════════════
// Send to avatar
// ═══════════════════════════════════════════
async function sendToAvatar(userQuestion) {
  if (!isConnected || isProcessing) return;
  isProcessing = true;

  addToTranscript('learner', userQuestion);
  setStatus('Thinking...', 'active');

  try {
    const reply = await getClaudeResponse(userQuestion);
    addToTranscript('assistant', reply);
    setStatus('Avatar speaking...', 'active');

    // Send text to avatar via LiveAvatar speak API
    setSpeaking(true);
    await fetch('https://api.liveavatar.com/v1/sessions/' + sessionId + '/speak', {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + currentSessionToken,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ text: reply })
    });
    setSpeaking(false);
    isProcessing = false;

    setStatus('Session active — ask your question');
  } catch (err) {
    setStatus('Error: ' + err.message, 'error');
    isProcessing = false;
    console.error('Error:', err);
  }
}

// ═══════════════════════════════════════════
// Text input
// ═══════════════════════════════════════════
function handleSendText() {
  const input = document.getElementById('questionInput');
  const text = input.value.trim();
  if (!text || !isConnected || isProcessing) return;
  input.value = '';
  input.style.height = 'auto';
  sendToAvatar(text);
}

// ═══════════════════════════════════════════
// Voice input (Web Speech API)
// ═══════════════════════════════════════════
function toggleVoice() {
  if (!isConnected || isProcessing) return;

  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    setStatus('Voice not supported in this browser — use Chrome', 'error');
    return;
  }

  if (isRecording) {
    stopVoice();
  } else {
    startVoice();
  }
}

function startVoice() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SpeechRecognition();
  recognition.lang = 'en-US';
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;

  recognition.onstart = () => {
    isRecording = true;
    const btn = document.getElementById('voiceBtn');
    btn.className = 'action-btn recording';
    btn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1 1.93c-3.95-.49-7-3.85-7-7.93H2c0 4.97 3.53 9.11 8 9.9V22h4v-4.07c4.47-.79 8-4.93 8-9.9h-2c0 4.08-3.05 7.44-7 7.93V15z"/></svg> Listening...`;
    setStatus('Listening...', 'active');
  };

  recognition.onresult = (e) => {
    const transcript = e.results[0][0].transcript;
    document.getElementById('questionInput').value = transcript;
    stopVoice();
    sendToAvatar(transcript);
  };

  recognition.onerror = (e) => {
    setStatus('Voice error: ' + e.error, 'error');
    stopVoice();
  };

  recognition.onend = () => { if (isRecording) stopVoice(); };

  recognition.start();
}

function stopVoice() {
  isRecording = false;
  if (recognition) { try { recognition.stop(); } catch (_) {} }
  const btn = document.getElementById('voiceBtn');
  btn.className = 'action-btn';
  btn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1 1.93c-3.95-.49-7-3.85-7-7.93H2c0 4.97 3.53 9.11 8 9.9V22h4v-4.07c4.47-.79 8-4.93 8-9.9h-2c0 4.08-3.05 7.44-7 7.93V15z"/></svg> Hold to Speak`;
}
</script>
